name: Check and publish backend

on:
  pull_request:
    types:
      - closed

jobs:
  if_merged:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code into runner
        uses: actions/checkout@v5
      - name: Build the Docker image
        env:
          DB_CONNECT: postgresql://${{ secrets.DB_CONNECT_USER }}:${{ secrets.DB_CONNECT_PASSWORD }}@${{ secrets.DB_CONNECT_URL }}/${{ secrets.DB_CONNECT_DATABASE }}?sslmode=require&channel_binding=require
          DOCS_URL: /docs
          ALLOWED_ORIGINS: [http://127.0.0.1:8080]
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/devops-project-backend:latest .
      - name: Log in to Docker Hub
        uses: docker/login-action@v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - name: Push the image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/devops-project-backend:latest      
